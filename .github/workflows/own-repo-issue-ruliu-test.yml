name: Issue RuLiu Test

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions: {}

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send RuLiu notification
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_JSON: ${{ toJson(github.event.issue) }}
          RULIU_WEBHOOK: ${{ secrets.RULIU_WEBHOOK }}
          RULIU_GROUP_ID: ${{ secrets.RULIU_GROUP_ID }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          if os.environ["EVENT_NAME"] == "workflow_dispatch":
              content = (
                  "### GitHub Issue 如流通知测试\n\n"
                  "这是手动触发测试消息。"
              )
          else:
              issue = json.loads(os.environ["ISSUE_JSON"])
              labels = ", ".join(label["name"] for label in issue.get("labels", [])) or "无"

              content = (
                  "### GitHub 新增Issue测试\n\n"
              )

          header = {}
          group_id = os.getenv("RULIU_GROUP_ID", "").strip()
          if group_id:
              header["toid"] = [int(group_id)]

          payload = {
              "message": {
                  "header": header,
                  "body": [
                      {
                          "type": "MD",
                          "content": content,
                      }
                  ],
              }
          }

          webhook = os.environ["RULIU_WEBHOOK"].strip()
          parsed_webhook = urllib.parse.urlparse(webhook)
          if parsed_webhook.scheme not in {"http", "https"} or not parsed_webhook.netloc:
              raise SystemExit(
                  "RULIU_WEBHOOK must be a complete URL, such as "
                  "https://example.com/path?access_token=xxx"
              )

          print(
              "Sending RuLiu request to "
              f"{parsed_webhook.scheme}://{parsed_webhook.netloc}{parsed_webhook.path}"
          )

          req = urllib.request.Request(
              webhook,
              data=json.dumps(payload, ensure_ascii=False).encode("utf-8"),
              headers={"Content-Type": "application/json;charset=utf-8"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  body = resp.read().decode("utf-8", errors="replace")
                  print(f"RuLiu response: HTTP {resp.status} {body}")
          except urllib.error.HTTPError as exc:
              print(exc.read().decode("utf-8", errors="replace"))
              raise
          except urllib.error.URLError as exc:
              raise SystemExit(
                  "Could not connect to RULIU_WEBHOOK. Check whether the "
                  f"domain is correct and publicly resolvable from GitHub Actions: {exc}"
              )
          PY
