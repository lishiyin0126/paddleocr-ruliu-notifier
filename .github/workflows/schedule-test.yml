name: Schedule Test

on:
  schedule:
    # GitHub Actions uses UTC. Runs every 10 minutes, away from minute 0.
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Print trigger info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          date -u
